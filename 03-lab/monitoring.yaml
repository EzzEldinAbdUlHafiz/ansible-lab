---
- name: Monitoring System
  hosts: all
  become: yes
  vars_prompt:
    - name: student_name
      prompt: "Please enter your full name"
      private: no
  tasks:
    - name: Copy script to remote
      copy:
        src: metrics.sh
        dest: /tmp/metrics.sh
        mode: '0755'

    - name: Execute Metrics Script with bash
      command: bash /tmp/metrics.sh
      register: script_output

    - name: Copy CSS file to the server
      copy:
        src: style.css
        dest: /var/www/html/style.css
        mode: '0644'

    - name: Deploy Dashboard using Template
      template:
        src: index.html
        dest: /var/www/html/index.html
        mode: '0644'
      vars:
        display_name: "{{ student_name }}"
        host_name: "{{ ansible_hostname }}"
        stats_output: "{{ script_output.stdout }}"
        update_time: "{{ ansible_date_time.time }}"


