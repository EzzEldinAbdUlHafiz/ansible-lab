---
- name: Setup and Configure Nginx Web Server
  hosts: webservers
  become: true
  vars:
    nginx_port: 80
    nginx_root: /var/www/html

  tasks:
    - name: Install Nginx package
      apt:
        name: nginx
        state: present
      tags: install

    - name: Deploy Nginx configuration from template
      template:
        src: templates/nginx.conf.j2
        dest: /etc/nginx/sites-available/default
      notify: Restart nginx
      tags: config

    - name: Create web root directory
      file:
        path: "{{ nginx_root }}"
        state: directory
        owner: www-data
        group: www-data
        mode: '0755'
      tags: config

    - name: Create index.html with server hostname
      copy:
        content: "Welcome to {{ inventory_hostname }}"
        dest: "{{ nginx_root }}/index.html"
      tags: config

    - name: Ensure Nginx service is started and enabled
      service:
        name: nginx
        state: started
        enabled: true
      tags: service

  handlers:
    - name: Restart nginx
      service:
        name: nginx
        state: restarted