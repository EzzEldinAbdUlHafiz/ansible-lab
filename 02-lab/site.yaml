---
- name: Setup and Configure Nginx Web Server
  hosts: webservers
  become: true
  vars:
    nginx_port: 80
    nginx_root: /var/www/html

  tasks:
    - name: Install nginx using the apt module
      apt:
        name: nginx
        state: present
      tags: install

    - name: Deploy nginx.conf from a Jinja2 template
      template:
        src: templates/nginx.conf.j2
        dest: /etc/nginx/sites-available/default
      notify: Restart nginx
      tags: config

    - name: Create the web root directory with correct permissions
      file:
        path: "{{ nginx_root }}"
        state: directory
        owner: www-data
        group: www-data
        mode: '0755'
      tags: config

    - name: Create an index.html file showing server hostname
      copy:
        content: "Welcome to {{ inventory_hostname }}"
        dest: "{{ nginx_root }}/index.html"
      tags: config

    - name: Start the nginx service and enable it to start on boot
      service:
        name: nginx
        state: started
        enabled: true
      tags: service

    - name: Verify Web Service Status
      block:
        - name: Check if Nginx returns 200 OK
          uri:
            url: "http://localhost:{{ nginx_port }}"
            status_code: 200
      rescue:
        - name: Print error if Nginx is unreachable
          debug:
            msg: "Nginx is not responding on port {{ nginx_port }}!"
  handlers:
    - name: Restart nginx
      service:
        name: nginx
        state: restarted